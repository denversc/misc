"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
[Óāī](bg:#769ff0 fg:#a3aed2)\
$directory\
[Óāī](fg:#769ff0 bg:#394260)\
$git_branch\
[Óāī](fg:#394260 bg:#212736)\
